sonar.host.url=https://sonarcloud.io
# must be unique in a given SonarQube instance
sonar.organization=tuanicom-github
sonar.projectKey=tuanicom_incap
# this is the name and version displayed in the SonarQube UI. Was mandatory prior to SonarQube 6.1.
sonar.projectName=incap
sonar.projectVersion=1.0

sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/*.spec.ts
# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
# This property is optional if sonar.modules is set. 

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

sonar.sources=apps/frontend/src/app,apps/backend/src
sonar.tests=apps/frontend/src/app,apps/backend/src
sonar.javascript.lcov.reportPaths=apps/frontend/coverage/frontend/lcov.info,coverage/apps/backend/lcov.info
sonar.eslint.reportPaths=apps/frontend/eslint.json,apps/backend/eslint.json
